services:
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    ports:
      - "8090:8090"
    volumes:
      - pb_data:/pb_data
      - ./pocketbase/pb_migrations:/pb_migrations
      - ./pocketbase/pb_hooks:/pb_hooks
    restart: unless-stopped

  web:
    build:
      context: ./web
      args:
        - VITE_POCKETBASE_URL=/
    ports:
      - "80:80"
    depends_on:
      - pocketbase
    restart: unless-stopped

volumes:
  pb_data:
