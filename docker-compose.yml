services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=file:/app/data/dev.db
      - EMAIL_HOST=mailpit
      - EMAIL_PORT=1025
      - SESSION_SECRET=nova-stack-dev-secret-change-in-production
    volumes:
      - ./data:/app/data
    depends_on:
      - mailpit

  mailpit:
    image: axllent/mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
